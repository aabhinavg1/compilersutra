<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">ANN runtime comparison on AMD Ryzen 7 9700X</title>
  <desc id="desc">Flat search is faster with GCC than Clang, while the HNSW-like path is close to parity.</desc>
  <rect width="980" height="420" fill="#ffffff"/>
  <rect x="20" y="20" width="940" height="380" rx="18" fill="#f8fafc" stroke="#dbe3ee"/>

  <text x="50" y="60" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Measured ANN runtime comparison</text>
  <text x="50" y="86" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Pinned to CPU 2 on AMD Ryzen 7 9700X, same dataset and same benchmark source</text>

  <rect x="50" y="115" width="410" height="240" rx="16" fill="#ffffff" stroke="#dbe3ee"/>
  <rect x="520" y="115" width="410" height="240" rx="16" fill="#ffffff" stroke="#dbe3ee"/>

  <text x="70" y="145" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Flat search</text>
  <text x="540" y="145" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">HNSW-like search</text>

  <line x1="90" y1="330" x2="410" y2="330" stroke="#cbd5e1"/>
  <line x1="560" y1="330" x2="880" y2="330" stroke="#cbd5e1"/>

  <text x="70" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">GCC</text>
  <text x="70" y="240" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Clang</text>

  <rect x="120" y="164" width="204" height="28" rx="6" fill="#2563eb"/>
  <rect x="120" y="219" width="270" height="28" rx="6" fill="#f97316"/>

  <text x="332" y="183" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">9.05 s</text>
  <text x="400" y="238" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">11.99 s</text>

  <text x="540" y="185" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">GCC</text>
  <text x="540" y="240" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">Clang</text>

  <rect x="590" y="164" width="266" height="28" rx="6" fill="#2563eb"/>
  <rect x="590" y="219" width="273" height="28" rx="6" fill="#f97316"/>

  <text x="864" y="183" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">0.7447 s</text>
  <text x="864" y="238" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">0.7646 s</text>

  <text x="70" y="286" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">GCC is 24.5% faster in flat mode</text>
  <text x="540" y="286" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">GCC is 2.6% faster in HNSW-like mode</text>

  <rect x="70" y="350" width="16" height="16" rx="4" fill="#2563eb"/>
  <text x="94" y="363" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">GCC</text>
  <rect x="140" y="350" width="16" height="16" rx="4" fill="#f97316"/>
  <text x="164" y="363" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Clang</text>
  <text x="280" y="363" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Same source, same flags, same pinning</text>
</svg>
